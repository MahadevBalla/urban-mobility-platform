# PopulationSim Configuration for Mumbai/India
# Adapted from example_calm for Indian context

# ============================================================================
# GEOGRAPHIC HIERARCHY
# ============================================================================
# List geographies in hierarchical order (largest to smallest)
# For India: REGION (city) > DISTRICT (census district) > WARD > TAZ
geographies: [REGION, DISTRICT, WARD, TAZ]
seed_geography: DISTRICT

# ============================================================================
# COLUMN MAPPINGS
# ============================================================================
household_weight_col: weight        # Initial sample weight
household_id_col: hh_id             # Unique household identifier
total_hh_control: num_hh            # Control for total households

# ============================================================================
# ALGORITHM SETTINGS
# ============================================================================
INTEGERIZE_WITH_BACKSTOPPED_CONTROLS: true
SUB_BALANCE_WITH_FLOAT_SEED_WEIGHTS: false
GROUP_BY_INCIDENCE_SIGNATURE: true
USE_SIMUL_INTEGERIZER: true

# Weight expansion limits
max_expansion_factor: 30            # Max weight multiplier
min_expansion_factor: 0.5           # Min weight multiplier

# Balancing iterations
MAX_BALANCE_ITERATIONS_SIMULTANEOUS: 1000
MAX_BALANCE_ITERATIONS_SEQUENTIAL: 100

# ============================================================================
# INPUT TABLE LIST
# ============================================================================
input_table_list:
  # Household seed sample (from HTS or synthetic)
  - tablename: households
    filename: seed_households.csv
    index_col: hh_id
    column_map:
      household_id: hh_id
    # drop_columns:
    #   - unwanted_column

  # Person seed sample
  - tablename: persons
    filename: seed_persons.csv
    # No index_col for persons - linked via hh_id

  # Geographic crosswalk
  - tablename: geo_cross_walk
    filename: geo_crosswalk.csv

  # Control totals at each geography level
  - tablename: TAZ_control_data
    filename: control_totals_taz.csv

  - tablename: WARD_control_data
    filename: control_totals_ward.csv

  - tablename: DISTRICT_control_data
    filename: control_totals_district.csv

  - tablename: REGION_control_data
    filename: control_totals_region.csv

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
output_tables:
  action: include
  tables:
    - expanded_household_ids
    - synthetic_households
    - synthetic_persons

output_synthetic_population:
  household_id: hh_id
  households:
    filename: synthetic_households.csv
    columns:
      - TAZ
      - WARD
      - DISTRICT
      - num_persons
      - income_category
      - num_vehicles
      - dwelling_type
  persons:
    filename: synthetic_persons.csv
    columns:
      - per_num
      - age
      - sex
      - employment_status
      - education
      - occupation

# ============================================================================
# TRACING (for debugging)
# ============================================================================
# trace_geography:
#   TAZ: 101
#   WARD: 1001

# ============================================================================
# RUN LIST
# ============================================================================
run_list:
  steps:
    - input_pre_processor
    - setup_data_structures
    - initial_seed_balancing
    - meta_control_factoring
    - final_seed_balancing
    - integerize_final_seed_weights
    - sub_balancing.geography=WARD
    - sub_balancing.geography=TAZ
    - expand_households
    - write_results
    - summarize

# To resume from a specific step:
# resume_after: integerize_final_seed_weights

# ============================================================================
# MULTIPROCESSING (for large regions)
# ============================================================================
