services:
  # PostgreSQL database with PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3
    container_name: urban_transit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: urban_transit_db
      POSTGRES_USER: urban_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-urban_transit_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urban_admin -d urban_transit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urban_transit_network

  # Urban Transit Tool application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urban_transit_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database connection
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: urban_transit_db
      DB_USER: urban_admin
      DB_PASSWORD: ${DB_PASSWORD:-urban_transit_2024}

      # Application settings
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: production
    volumes:
      # Mount source code for development
      - ./src:/app/src
      - ./app.py:/app/app.py
      - ./test_zone_generation.py:/app/test_zone_generation.py

      # Persistent data directories
      - ./data:/app/data
      - ./cache:/app/cache
      - ./output_cache:/app/output_cache

      # Configuration
      - ./setup_config.yaml:/app/setup_config.yaml
    ports:
      - "8501:8501"  # Streamlit dashboard
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - urban_transit_network

  # pgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: urban_transit_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - urban_transit_network
    profiles:
      - tools  # Only starts with: docker-compose --profile tools up

volumes:
  postgres_data:
    name: urban_transit_postgres_data
  pgadmin_data:
    name: urban_transit_pgadmin_data

networks:
  urban_transit_network:
    name: urban_transit_network
    driver: bridge
